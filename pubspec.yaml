name: bunny_wallet
description: A beautiful expense tracker app with income, expense, savings, and credit card management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  flutter_animate: ^4.5.2
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
